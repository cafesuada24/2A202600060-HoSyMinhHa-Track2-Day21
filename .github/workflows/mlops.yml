name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        # TODO 1: Viet lenh de chay pytest tren thu muc tests/ voi co -v
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        # TODO 2: Ghi noi dung credentials ra file tam va set bien moi truong xac thuc.
        # GCP:   echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
        #        echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV
        # AWS:   echo "AWS_ACCESS_KEY_ID=..." >> $GITHUB_ENV  (lay tu secrets)
        #        echo "AWS_SECRET_ACCESS_KEY=..." >> $GITHUB_ENV
        # Azure: echo "AZURE_STORAGE_CONNECTION_STRING=..." >> $GITHUB_ENV
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - id: 'auth'
        name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.CLOUD_CREDENTIALS }}'
          create_credentials_file: true
          export_environment_variables: true

      - name: Pull data with DVC
        run: |
          dvc remote modify --local myremote credentialpath "${{ steps.auth.outputs.credentials_file_path }}"
          dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        # TODO 4: Doc gia tri "accuracy" tu outputs/metrics.json bang Python inline.
        #         Set ket qua thanh output "accuracy" de job deploy co the doc.
        #
        # Goi y:
        #   ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
        #   echo "accuracy=$ACC" >> $GITHUB_OUTPUT
        run: |
            ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
            echo "accuracy=$ACC" >> $GITHUB_OUTPUT
          

      - name: Upload model to Cloud Storage (with safety gate)
        run: |
          python - <<'EOF'
          import os
          import json
          from google.cloud import storage

          storage_client = storage.Client()
          bucket_name = "${{ secrets.CLOUD_BUCKET }}".replace("gs://", "")
          bucket = storage_client.bucket(bucket_name)
          
          # Bonus 4: Hoan tra ve phien ban truoc (Safety Gate)
          # Tai metrics cua lan chay truoc tu cloud storage de so sanh
          metrics_blob = bucket.blob('models/latest/metrics.json')
          new_metrics = json.load(open('outputs/metrics.json'))
          new_acc = new_metrics['accuracy']
          
          if metrics_blob.exists():
              try:
                  old_metrics = json.loads(metrics_blob.download_as_string())
                  old_acc = old_metrics.get('accuracy', 0)
                  print(f"Comparing accuracies: Old={old_acc:.4f}, New={new_acc:.4f}")
                  if new_acc < old_acc:
                      print(f"!!! Error: New accuracy {new_acc:.4f} is lower than current {old_acc:.4f}.")
                      print("Aborting deployment to maintain model quality.")
                      exit(1)
                  print("Performance check passed.")
              except Exception as e:
                  print(f"Warning: Could not parse old metrics: {e}. Proceeding anyway.")
          else:
              print("No previous metrics found. First deployment.")

          # Upload model va metrics moi
          model_blob = bucket.blob('models/latest/model.pkl')
          if os.path.exists('models/model.pkl'):
              model_blob.upload_from_filename('models/model.pkl')
              metrics_blob.upload_from_filename('outputs/metrics.json')
              print(f"Successfully uploaded new model and metrics to {bucket_name}")
          else:
              print("Error: models/model.pkl not found!")
              exit(1)
          EOF

      - name: Save reports and metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            outputs/metrics.json
            outputs/report.txt


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        # TODO 6: Doc accuracy tu output cua job train.
        #         Neu accuracy < 0.70, ket thuc voi loi ro rang.
        #         Neu dat nguong, in thong bao va tiep tuc.
        #
        # Goi y:
        #   acc = float("${{ needs.train.outputs.accuracy }}")
        #   if acc < 0.70:
        #       raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
        #   print("PASSED: dang trien khai model.")
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.60:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.60. Huy deploy.")
          print("PASSED: dang trien khai model.")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # TODO 7: Restart service mlops-serve tren VM.
            # TODO 8: Cho server san sang roi goi curl /health de xac nhan.
            #         Neu health check that bai sau nhieu lan thu, thoat voi exit 1.
            #
            # Goi y:
            sudo systemctl restart mlops-serve
            sleep 5
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1
            # <dien lenh bash o day>
